<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Tracker Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Telegram Mini App</p>
      <h1>Твои товары под контролем</h1>
      <p id="subtitle" class="subtitle">Загружаем список товаров...</p>
    </header>

    <section class="toolbar">
      <button id="refreshBtn" class="btn">Обновить</button>
      <span id="countBadge" class="badge">0 товаров</span>
    </section>

    <section id="state" class="state">Проверяем данные Telegram...</section>
    <section id="grid" class="products-grid"></section>

    <section id="debugPanel" class="debug hidden">
      <p>Режим браузера: вставь initData для локальной проверки.</p>
      <textarea id="initDataInput" placeholder="query_id=...&user=...&auth_date=...&hash=..."></textarea>
      <button id="debugLoadBtn" class="btn">Загрузить товары</button>
    </section>
  </main>

  <script type="module" src="/frontend/main.js"></script>
</body>
</html>
